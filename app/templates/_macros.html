{% macro render_field(field) %}
  <div class="mb-3">
    {{ field.label(class="form-label") }}
    {{ field(class="form-control") }}
    {% if field.errors %}
      <div class="text-danger small">
        {% for err in field.errors %}{{ err }}<br>{% endfor %}
      </div>
    {% endif %}
  </div>
{% endmacro %}
